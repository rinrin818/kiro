<!-- index.html · 키로 데모 (Node 서버 연동) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3182f6">
<title>키로</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── 키로 디자인 시스템 (Toss-inspired) ───────────────────────── */
:root{
  --bg:#f7f8fa;
  --surface:#fff;
  --surface-1:#f9fafb;
  --surface-2:#f2f4f6;
  --surface-3:#e8eaed;
  --border:#e5e8ef;
  --text:#191f28;
  --text-2:#4e5968;
  --text-3:#8b95a1;
  --text-4:#b0b8c1;
  --primary:#3182f6;
  --primary-hover:#1b64da;
  --primary-soft:#e8f3ff;
  --danger:#f04452;
  --danger-soft:#fff5f6;
  --success:#22c55e;
  --warning:#f59e0b;
  --warning-soft:#fef9e8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
button,input,textarea{font-family:inherit;color:inherit}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:var(--surface);
  position:relative;
  box-shadow:0 0 0 1px rgba(0,0,0,.02);
}

.screen{display:none;min-height:100vh;padding-bottom:32px}
.screen.active{display:block}

/* ── 상단바 ─────────────────────────────────────────────── */
.top-bar{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 16px;
  position:sticky;
  top:0;
  background:var(--surface);
  z-index:30;
}
.top-bar .back{
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:12px;
  color:var(--text);font-size:22px;font-weight:500;
}
.top-bar .back:hover{background:var(--surface-2)}
.top-bar .title{
  font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text);
}
.top-bar .right{margin-left:auto;display:flex;align-items:center;gap:4px}
.ghost-btn{
  background:none;border:none;
  font-size:14px;font-weight:600;color:var(--text-2);
  cursor:pointer;padding:8px 12px;border-radius:10px;
  display:inline-flex;align-items:center;gap:4px;
}
.ghost-btn:hover{background:var(--surface-2);color:var(--text)}

/* ── 본문 컨테이너 ─────────────────────────────────────── */
.container{padding:0 20px}

/* ── 메인 화면 헤더 ──────────────────────────────────── */
.hero{padding:8px 0 28px}
.hero h1{
  font-size:28px;font-weight:800;letter-spacing:-.7px;color:var(--text);
  line-height:1.25;
}
.hero .sub{
  font-size:15px;color:var(--text-3);font-weight:500;
  margin-top:8px;line-height:1.6;letter-spacing:-.2px;
}

/* ── 폴더 화면 메뉴 (미트볼) ───────────────────────── */
#folder{position:relative}
.folder-menu{
  position:absolute;top:50px;right:12px;
  background:var(--surface);border-radius:12px;
  box-shadow:0 6px 20px rgba(25,31,40,.14);
  padding:6px;z-index:35;min-width:130px;display:none;
}
.folder-menu.open{display:block}
.folder-menu button{
  display:block;width:100%;text-align:left;
  background:none;border:none;cursor:pointer;
  padding:10px 12px;border-radius:8px;
  font-family:inherit;font-size:14px;font-weight:600;color:var(--text);
  letter-spacing:-.2px;
}
.folder-menu button:hover{background:var(--surface-1)}
.folder-menu button.danger{color:var(--danger)}
.folder-menu button.danger:hover{background:var(--danger-soft)}

/* ── 컴포저 (URL + 첨부) ────────────────────────────── */
.composer{
  background:var(--surface-1);
  border-radius:18px;
  padding:18px 18px 14px;
  transition:background .15s,box-shadow .15s;
}
.composer:focus-within{background:var(--surface-2)}
.composer.dragover{
  background:var(--primary-soft);
  box-shadow:inset 0 0 0 2px var(--primary);
}
.composer textarea{
  width:100%;border:none;outline:none;resize:none;
  background:transparent;color:var(--text);
  font-family:inherit;
  font-size:16px;line-height:1.55;letter-spacing:-.2px;
  min-height:80px;
}
.composer textarea::placeholder{color:var(--text-4)}
.composer-actions{
  display:flex;align-items:center;gap:8px;
  margin-top:8px;flex-wrap:wrap;
}
.composer-actions .spacer{flex:1}
.attach-btn{
  display:inline-flex;
  align-items:center;gap:6px;
  padding:8px 14px;border:none;
  background:var(--surface);color:var(--text-2);
  border-radius:100px;cursor:pointer;
  font-family:inherit;
  font-size:13px;font-weight:600;
  transition:.12s;
}
.attach-btn:hover{background:var(--primary-soft);color:var(--primary)}
.attach-btn svg{width:14px;height:14px}
.file-chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 10px 7px 12px;
  background:var(--primary-soft);color:var(--primary);
  border-radius:100px;font-size:13px;font-weight:600;max-width:220px;
}
.file-chip .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-chip .x{
  background:rgba(49,130,246,.15);border:none;color:var(--primary);
  cursor:pointer;font-size:13px;padding:0;line-height:1;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.char-count{
  font-size:12px;color:var(--text-4);font-weight:500;
  margin:8px 4px 0;text-align:right;
}
.char-count.over{color:var(--danger)}

/* ── 메모 토글 ─────────────────────────────────────── */
.memo-toggle{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;
  color:var(--primary);font-size:14px;font-weight:600;
  cursor:pointer;padding:14px 4px 6px;letter-spacing:-.2px;
}
.memo-toggle:hover{color:var(--primary-hover)}
.memo-wrap{margin-top:6px;display:none}
.memo-wrap.open{display:block}
.memo-wrap textarea{
  width:100%;
  padding:14px 16px;
  font-family:inherit;
  font-size:15px;line-height:1.55;letter-spacing:-.2px;
  border:none;outline:none;resize:none;
  background:var(--surface-1);
  border-radius:14px;
  color:var(--text);
  transition:.15s;
}
.memo-wrap textarea:focus{background:var(--surface-2)}
.memo-wrap textarea::placeholder{color:var(--text-4)}

/* ── 버튼 ──────────────────────────────────────────── */
.btn{
  width:100%;height:56px;
  font-size:17px;font-weight:700;letter-spacing:-.3px;
  background:var(--primary);color:#fff;
  border:none;border-radius:14px;cursor:pointer;
  transition:background .12s,transform .08s;
}
.btn:hover:not(:disabled){background:var(--primary-hover)}
.btn:active:not(:disabled){transform:scale(.99)}
.btn:disabled{background:var(--surface-3);color:var(--text-4);cursor:not-allowed}
.btn-secondary{background:var(--surface-2);color:var(--text)}
.btn-secondary:hover:not(:disabled){background:var(--surface-3)}
.btn-danger{background:var(--surface);color:var(--danger);box-shadow:inset 0 0 0 1px #ffd6da}
.btn-danger:hover:not(:disabled){background:var(--danger-soft)}

.cta{margin-top:20px}
.btn-row{display:flex;gap:8px;margin-top:24px}
.btn-row .btn{flex:1}

/* ── 에러 / 로딩 ──────────────────────────────────── */
.error{margin-top:16px;padding:16px;background:var(--danger-soft);border-radius:14px;color:var(--danger);font-size:14px;line-height:1.55}
.error-msg{font-weight:600;margin-bottom:4px}
.error-detail{font-size:12.5px;color:var(--text-3);margin-bottom:12px;word-break:break-word}
.btn-retry{
  padding:9px 16px;font-size:13px;font-weight:600;
  background:var(--surface);color:var(--danger);
  border:1px solid #ffd6da;border-radius:10px;cursor:pointer;
}
.btn-retry:hover{background:var(--danger-soft)}
.loading{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 폴더 헤더 ──────────────────────────────────── */
.folder-head{padding:12px 0 28px}
.folder-name{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.6px;margin-bottom:6px;line-height:1.25}
.folder-count{font-size:14px;color:var(--text-3);font-weight:500}

/* ── 카드 ──────────────────────────────────────── */
.cards{display:flex;flex-direction:column;gap:10px}
.card{
  position:relative;
  padding:18px;
  background:var(--surface-1);
  border-radius:16px;
  transition:background .12s;
  display:flex;
  gap:14px;
}
.card:hover{background:var(--surface-2)}
.card-icon-wrap{
  width:40px;height:40px;
  border-radius:10px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  margin-top:2px;
  position:relative;
  overflow:hidden;
}
.card-icon-wrap img{width:24px;height:24px;border-radius:4px;object-fit:contain}
.card-icon-wrap.fallback{
  background:var(--brand,#9aa5b1);
  color:#fff;
}
.card-icon-wrap.fallback::before{
  content:attr(data-initial);
  font-size:18px;font-weight:800;line-height:1;letter-spacing:-.5px;
}
.card-icon-wrap.file{background:var(--surface-2);color:var(--text-3)}
.card-icon-wrap.file::before{content:"📄";font-size:20px;line-height:1}
.card-icon-wrap.file-type{background:var(--file-color,#8b95a1)}
.card-icon-wrap.file-type::before{content:attr(data-label);color:#fff;font-size:13px;font-weight:800;letter-spacing:-.3px}
.card-content{flex:1;min-width:0;padding-right:60px}
.card-link{display:block;text-decoration:none;color:inherit}
.card-title{
  font-size:16px;font-weight:700;color:var(--text);
  line-height:1.4;letter-spacing:-.3px;
  margin-bottom:6px;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-desc{font-size:14px;color:var(--text-2);line-height:1.55;margin-bottom:10px;word-break:break-word}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:12px;color:var(--text-2);background:var(--surface-3);padding:4px 10px;border-radius:100px;font-weight:600;letter-spacing:-.1px}

/* 카드 상단 행 (카테고리 + 날짜) */
.card-top-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-date{font-size:12px;color:var(--text-4);font-weight:500;flex-shrink:0}

/* 카테고리 변경 버튼 (카드 좌상단, 칩 형태) */
.cat-badge-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--primary-soft);color:var(--primary);
  border:none;padding:5px 6px 5px 10px;
  border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:-.1px;
  transition:background .12s;flex-shrink:0;
}
.cat-badge-btn:hover{background:#d6e7ff}
.cat-badge-btn .arrow{width:13px;height:13px;opacity:.7}

/* 카테고리 선택 시트 */
.mp-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:16px}
.mp-list{display:flex;flex-direction:column;gap:2px;max-height:260px;overflow-y:auto;margin:0 -8px;padding:0 4px}
.mp-list::-webkit-scrollbar{width:6px}
.mp-list::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
.mp-option{
  display:flex;align-items:center;gap:12px;
  padding:14px 12px;background:none;border:none;
  cursor:pointer;border-radius:12px;text-align:left;
  font:inherit;font-size:15px;font-weight:600;color:var(--text);
  letter-spacing:-.2px;width:100%;transition:background .12s;
}
.mp-option:hover{background:var(--surface-1)}
.mp-option.current{background:var(--primary-soft);color:var(--primary)}
.mp-option .mp-radio{font-size:17px;width:20px;color:var(--text-4)}
.mp-option.current .mp-radio{color:var(--primary)}
.mp-option .mp-name{flex:1}
.mp-option .mp-current-tag{font-size:11px;background:var(--primary);color:#fff;padding:2px 8px;border-radius:6px;font-weight:700;letter-spacing:-.1px}
.mp-divider{height:1px;background:var(--surface-2);margin:14px 0}
.mp-new-btn{
  width:100%;display:flex;align-items:center;gap:8px;
  padding:14px 12px;background:var(--surface-1);
  border:none;border-radius:12px;cursor:pointer;
  font:inherit;font-size:14px;font-weight:600;color:var(--primary);
  text-align:left;transition:.12s;letter-spacing:-.2px;
}
.mp-new-btn:hover{background:var(--primary-soft)}
.mp-new-wrap{display:none;margin-top:8px;flex-direction:column;gap:8px}
.mp-new-wrap.show{display:flex}
.mp-new-wrap input{
  padding:14px 16px;font-size:15px;font-weight:500;
  border:none;background:var(--surface-1);border-radius:12px;outline:none;color:var(--text);
}
.mp-new-wrap input:focus{background:var(--surface-2)}
.mp-new-wrap input::placeholder{color:var(--text-4);font-weight:400}
.mp-actions{display:flex;gap:8px;margin-top:14px}
.mp-actions .btn{flex:1;height:48px;font-size:15px}

/* 카드 액션 (복사 / 미트볼 메뉴) */
.copy-btn,.menu-btn{
  position:absolute;top:12px;
  width:32px;height:32px;border:none;background:transparent;
  cursor:pointer;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-3);padding:0;transition:.12s;
}
.copy-btn{right:48px}
.menu-btn{right:12px}
.copy-btn:hover,.menu-btn:hover{background:var(--surface)}
.copy-btn:hover{color:var(--primary)}
.copy-btn.copied{color:var(--success)}
.menu-btn:hover{color:var(--text)}
.copy-btn svg,.menu-btn svg{width:16px;height:16px}

/* 미트볼 팝업 메뉴 */
.card-menu{
  position:absolute;top:46px;right:12px;
  background:var(--surface);
  border-radius:12px;
  box-shadow:0 6px 20px rgba(25,31,40,.14);
  padding:6px;z-index:25;min-width:128px;
  display:none;
}
.card-menu.open{display:block}
.card-menu button{
  display:block;width:100%;text-align:left;
  background:none;border:none;cursor:pointer;
  padding:10px 12px;border-radius:8px;
  font:inherit;font-size:14px;font-weight:600;color:var(--text);
  letter-spacing:-.2px;
}
.card-menu button:hover{background:var(--surface-1)}
.card-menu button.danger{color:var(--danger)}
.card-menu button.danger:hover{background:var(--danger-soft)}

/* ── 빈 상태 ──────────────────────────────────── */
.empty{padding:64px 20px;text-align:center}
.empty .icon{font-size:44px;margin-bottom:14px;opacity:.6}
.empty .text{font-size:15px;color:var(--text-2);font-weight:600;letter-spacing:-.2px}
.empty .sub{font-size:13px;color:var(--text-4);margin-top:6px;font-weight:500}

/* ── 보관함: 검색 / 칩 / 섹션 ──────────────────── */
.section-label{
  font-size:13px;font-weight:700;letter-spacing:-.2px;color:var(--text-2);
  margin:22px 0 10px;
  display:flex;align-items:center;gap:6px;
}
.section-label .right{margin-left:auto;font-size:12px;color:var(--text-4);font-weight:500}
.section-label .reset-link{
  margin-left:auto;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--primary);font-family:inherit;
  padding:0;
}
.section-label .reset-link:hover{color:var(--primary-hover)}

.search-box{position:relative}
.search-box input{
  width:100%;padding:14px 16px 14px 44px;
  font-size:15px;font-weight:500;letter-spacing:-.2px;
  border:none;background:var(--surface-1);
  border-radius:14px;outline:none;color:var(--text);
  transition:background .15s;
}
.search-box input:focus{background:var(--surface-2)}
.search-box input::placeholder{color:var(--text-4);font-weight:400}
.search-box svg{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:var(--text-3);pointer-events:none;
}

.chips-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:9px 14px;
  border:none;background:var(--surface-1);
  color:var(--text-2);border-radius:100px;
  font-size:13px;font-weight:600;letter-spacing:-.1px;
  cursor:pointer;transition:.12s;white-space:nowrap;
}
.chip:hover{background:var(--surface-2)}
.chip.active{background:var(--text);color:#fff}
.chip.domain-chip{padding-left:8px;gap:6px;display:inline-flex;align-items:center}
.chip.domain-chip .favicon-wrap{
  width:16px;height:16px;border-radius:3px;flex-shrink:0;
  background:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.chip.domain-chip .favicon-wrap img{width:14px;height:14px;object-fit:contain}
.chip.domain-chip .favicon-wrap.fallback{background:var(--brand,#9aa5b1);color:#fff}
.chip.domain-chip .favicon-wrap.fallback::before{
  content:attr(data-initial);
  font-size:10px;font-weight:800;line-height:1;
}
.chip.domain-chip.active{background:var(--primary);color:#fff}
.chip.domain-chip.active .favicon-wrap{background:rgba(255,255,255,.25)}
.chip .num{margin-left:6px;font-size:11px;opacity:.6;font-weight:500}
.lib-empty-tags{font-size:13px;color:var(--text-4);padding:8px 2px;font-weight:500}

/* ── 모달 ─────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(25,31,40,.5);
  display:none;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal-bg.show{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border-radius:20px;padding:24px 24px 20px;
  max-width:380px;width:100%;
  animation:popIn .18s cubic-bezier(.2,.8,.2,1.05);
}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal p{
  font-size:16px;font-weight:600;line-height:1.5;letter-spacing:-.3px;
  color:var(--text);margin-bottom:20px;white-space:pre-line;
}

/* ── 토스트 ─────────────────────────────────── */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--text);color:#fff;
  padding:13px 22px;border-radius:100px;
  font-size:14px;font-weight:600;letter-spacing:-.2px;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
  z-index:200;box-shadow:0 8px 24px rgba(25,31,40,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 상세 화면 ──────────────────────────────── */
.detail-cat{margin-bottom:0}
.detail-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.detail-meta{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-4);font-weight:500}
.detail-favicon{width:16px;height:16px;border-radius:3px;flex-shrink:0;object-fit:contain}
.detail-title-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.detail-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.35;word-break:break-word;flex:1}
.detail-copy{
  flex-shrink:0;margin-top:2px;
  width:36px;height:36px;border:none;background:var(--surface-1);
  border-radius:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-3);transition:.12s;padding:0;
}
.detail-copy:hover{background:var(--surface-2);color:var(--primary)}
.detail-copy.copied{color:var(--success)}
.detail-copy svg{width:18px;height:18px}
.detail-card{
  background:var(--surface-1);border-radius:14px;padding:16px;margin-bottom:10px;
}
.detail-card .label{font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:6px}
.detail-card .body{font-size:15px;color:var(--text-2);line-height:1.6;word-break:break-word;white-space:pre-wrap}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 20px}

<body>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const MAX_LENGTH = 2000;
const URL_REGEX = /^https?:\/\/[^\s]+$/i;
const FOLDERS_STORAGE = "kiro_folders";
const FOLDER_LIST_STORAGE = "kiro_folder_list";
const DEFAULT_FOLDERS = ["개발", "디자인", "기획·PM", "트렌드·뉴스", "인사이트·아티클"];

const $ = (id) => document.getElementById(id);
const $input = $("input"), $count = $("count"), $go = $("go"), $error = $("error");
const $cards = $("cards"), $folderName = $("folderName"), $folderCount = $("folderCount");
const $toast = $("toast");
const $fileInput = $("fileInput"), $attachBtn = $("attachBtn"), $fileChipSlot = $("fileChipSlot");
const $memo = $("memo");
const $libSearch = $("libSearch"), $libChips = $("libChips"), $libCards = $("libCards"), $libTotal = $("libTotal");
const $libFilteredCount = $("libFilteredCount");
const $libDomainChips = $("libDomainChips"), $libDomainReset = $("libDomainReset");

let folders = JSON.parse(localStorage.getItem(FOLDERS_STORAGE) || "{}");
let folderList = JSON.parse(localStorage.getItem(FOLDER_LIST_STORAGE) || "null") || [...DEFAULT_FOLDERS];
let currentCategory = null;
let isProcessing = false;
let attachedFile = null;
let libFilter = { q: "", category: "전체", domains: new Set() };

function saveFolderList() {
  localStorage.setItem(FOLDER_LIST_STORAGE, JSON.stringify(folderList));
}

function getItemDomain(item) {
  if (!item?.url) return null;
  try { return new URL(item.url).hostname.replace(/^www\./, ""); }
  catch { return null; }
}

function faviconUrl(domain) {
  // DuckDuckGo의 ip3 서비스 — 한국 사이트 포함 안정적
  return `https://icons.duckduckgo.com/ip3/${encodeURIComponent(domain)}.ico`;
}

// 주요 도메인 브랜드 컬러 (favicon 폴백용)
const BRAND_COLORS = {
  "naver.com": "#03c75a",
  "n.news.naver.com": "#03c75a",
  "news.naver.com": "#03c75a",
  "m.naver.com": "#03c75a",
  "blog.naver.com": "#03c75a",
  "cafe.naver.com": "#03c75a",
  "youtube.com": "#ff0000",
  "youtu.be": "#ff0000",
  "github.com": "#24292f",
  "x.com": "#000000",
  "twitter.com": "#1da1f2",
  "instagram.com": "#e4405f",
  "facebook.com": "#1877f2",
  "figma.com": "#a259ff",
  "medium.com": "#000000",
  "velog.io": "#20c997",
  "tistory.com": "#ff5126",
  "brunch.co.kr": "#ff8b65",
  "notion.so": "#000000",
  "linkedin.com": "#0a66c2",
  "news.hada.io": "#fb923c",
  "dribbble.com": "#ea4c89",
  "behance.net": "#1769ff",
  "stackoverflow.com": "#f48024",
  "google.com": "#4285f4",
};

function getBrandColor(domain) {
  if (!domain) return "#9aa5b1";
  if (BRAND_COLORS[domain]) return BRAND_COLORS[domain];
  for (const key of Object.keys(BRAND_COLORS)) {
    if (domain === key || domain.endsWith("." + key)) return BRAND_COLORS[key];
  }
  // 해시 기반 폴백 컬러
  let h = 0;
  for (const c of domain) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;
  return `hsl(${Math.abs(h) % 360}, 45%, 48%)`;
}

function getDomainInitial(domain) {
  if (!domain) return "#";
  // 서브도메인이 길면 메인 도메인의 첫 글자 사용 (예: n.news.naver.com → N)
  const parts = domain.split(".");
  const main = parts.length >= 2 ? parts[parts.length - 2] : parts[0];
  return (main[0] || "#").toUpperCase();
}

function saveFolders() {
  try {
    localStorage.setItem(FOLDERS_STORAGE, JSON.stringify(folders));
  } catch (e) {
    // 용량 초과 — 원본 파일(fileData)을 비우고 재시도 (분류 결과는 유지)
    for (const cat of Object.keys(folders)) {
      for (const it of folders[cat]) {
        if (it.fileData) { delete it.fileData; it.fileDataDropped = true; }
      }
    }
    try {
      localStorage.setItem(FOLDERS_STORAGE, JSON.stringify(folders));
      showToast("저장 공간이 부족해 일부 원본 파일은 보관하지 못했어요");
    } catch {
      showToast("저장 공간이 부족해요");
    }
  }
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(name).classList.add("active");
  window.scrollTo(0, 0);
}

function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add("show");
  setTimeout(() => $toast.classList.remove("show"), 1500);
}

function showModal(msg) {
  return new Promise((resolve) => {
    $("alertMsg").textContent = msg;
    $("alertModal").classList.add("show");
    const close = () => {
      $("alertModal").classList.remove("show");
      $("alertOk").onclick = null;
      resolve();
    };
    $("alertOk").onclick = close;
  });
}

// 텍스트 입력 모달 — 새 폴더 / 폴더 이름 변경에 사용
function promptModal(title, value = "", placeholder = "") {
  return new Promise((resolve) => {
    const modal = $("promptModal"), input = $("promptInput");
    $("promptTitle").textContent = title;
    input.value = value;
    input.placeholder = placeholder;
    modal.classList.add("show");
    setTimeout(() => { input.focus(); input.select(); }, 0);
    const close = (val) => {
      modal.classList.remove("show");
      $("promptOk").onclick = null;
      $("promptCancel").onclick = null;
      input.onkeydown = null;
      resolve(val);
    };
    const confirm = () => {
      const v = input.value.trim();
      if (!v) return;
      close(v);
    };
    $("promptOk").onclick = confirm;
    $("promptCancel").onclick = () => close(null);
    input.onkeydown = (e) => {
      if (e.key === "Enter") { e.preventDefault(); confirm(); }
    };
  });
}

function updateGoButton() {
  const len = $input.value.trim().length;
  $go.disabled = isProcessing || (len === 0 && !attachedFile);
}

// 파일 칩 렌더 — 메인/모달 공용
function renderFileChipEl(slotEl, file, onRemove) {
  slotEl.innerHTML = "";
  if (!file) return;
  const chip = document.createElement("div");
  chip.className = "file-chip";
  chip.innerHTML = `📎 <span class="name"></span><button type="button" class="x" aria-label="첨부 취소">×</button>`;
  chip.querySelector(".name").textContent = file.name;
  chip.querySelector(".x").onclick = onRemove;
  slotEl.appendChild(chip);
}

function renderFileChip() {
  renderFileChipEl($fileChipSlot, attachedFile, () => {
    attachedFile = null;
    $fileInput.value = "";
    renderFileChip();
    updateGoButton();
  });
}

$attachBtn.onclick = () => $fileInput.click();

const ALLOWED_EXTS = ["pdf", "docx", "xlsx", "xls"];
const MAX_FILE_MB = 4;

// 메인 화면 파일 첨부 (버튼 / 드래그앤드롭 공통)
function setAttachedFile(file) {
  if (!file) return;
  const ext = (file.name.split(".").pop() || "").toLowerCase();
  if (!ALLOWED_EXTS.includes(ext)) {
    showToast("PDF · DOCX · XLSX 파일만 올릴 수 있어요");
    return;
  }
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    showToast(`${MAX_FILE_MB}MB 이하 파일만 올릴 수 있어요`);
    return;
  }
  attachedFile = file;
  renderFileChip();
  updateGoButton();
}

const $memoToggle = $("memoToggle"), $memoWrap = $("memoWrap");
// 토글 버튼 — 문구는 항상 "＋ 메모 추가하기 (선택)"로 고정
$memoToggle.onclick = () => {
  const open = $memoWrap.classList.toggle("open");
  if (open) setTimeout(() => $memo.focus(), 0);

function parseResponse(raw) {
  const result = { title: "", summary: "", category: "", tags: [] };

  const titleMatch = raw.match(/1\.\s*제목\s*[:：]\s*(.+)/);
  const summaryMatch = raw.match(/2\.\s*한\s*줄\s*요약\s*[:：]\s*(.+)/);
  const categoryMatch = raw.match(/3\.\s*카테고리\s*[:：]\s*(.+)/);
  const tagsMatch = raw.match(/4\.\s*검색\s*태그\s*[:：]\s*(.+)/);

  if (titleMatch) result.title = titleMatch[1].trim();
  if (summaryMatch) result.summary = summaryMatch[1].trim();
  if (categoryMatch) result.category = categoryMatch[1].trim();
  if (tagsMatch) {
    result.tags = tagsMatch[1].split(/[,，]/).map(t => t.trim().replace(/^#/, "")).filter(Boolean).slice(0, 3);
  }

  if (!result.category) throw new Error("응답 파싱 실패: " + raw);
  return result;
}

function escapeHtml(str) {

  return String(str).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// 저장된 원본 파일(base64)을 내려받기
function downloadFile(item) {
  if (!item.fileData) { showToast("원본 파일이 저장돼 있지 않아요"); return; }
  try {
    const mime = FILE_TYPE_META[getFileExt(item)]?.mime || "application/octet-stream";
    const bin = atob(item.fileData);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const blob = new Blob([arr], { type: mime });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = item.fileName || "document";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  } catch {
    showToast("내려받기에 실패했어요");
  }
}

function isValidURL(str) {

function parseInput(raw, memoFieldValue) {
  const urls = [];
  const extraMemoLines = [];
  for (const line of raw.split(/\n+/).map(l => l.trim()).filter(Boolean)) {
    if (isValidURL(line)) urls.push(line);
    else extraMemoLines.push(line);
  }
  const memoParts = [];
  if (memoFieldValue?.trim()) memoParts.push(memoFieldValue.trim());
  if (extraMemoLines.length) memoParts.push(extraMemoLines.join(" / "));
  return { urls, memo: memoParts.join(" / ") };
}

function confirmModal(msg, opts = {}) {
  return new Promise((resolve) => {
    $("alertMsg").textContent = msg;
    const modal = $("alertModal");
    modal.classList.add("show");
    const ok = $("alertOk");
    const prev = ok.textContent;

    cancel.className = "btn btn-secondary";
    cancel.textContent = opts.cancelLabel || "취소";
    cancel.style.marginTop = "8px";
    cancel.style.width = "100%";
    ok.after(cancel);
    const close = (val) => {
      modal.classList.remove("show");
      ok.textContent = prev;
      ok.onclick = null;
      cancel.remove();
      resolve(val);
    };
    ok.onclick = () => close(true);
    cancel.onclick = () => close(false);
  });
}

// 에러 원인을 한 줄로 — 무엇이 잘못됐는지 사용자에게 안내
function friendlyError(e) {
  const m = (e?.message || "").toLowerCase();
  if (m.includes("failed to fetch") || m.includes("network")) return "네트워크 연결을 확인해 주세요.";
  if (m.includes("응답 파싱") || m.includes("parse")) return "AI 응답 형식이 올바르지 않아요.";
  if (m.includes("파일")) return e.message;
  if (m.includes("429") || m.includes("rate")) return "요청이 많아요. 잠시 후 다시 시도해 주세요.";
  if (m.includes("500") || m.includes("서버")) return "서버에서 일시적인 문제가 발생했어요.";
  if (m.includes("413") || m.includes("large") || m.includes("크")) return "파일이 너무 커요. 4MB 이하로 올려주세요.";
  return (e?.message || "알 수 없는 오류").split("\n")[0].slice(0, 80);
}

async function classifyAndSave({ rawText, memoText, file, goBtn, errorEl, onSuccess }) {

  const raw = (rawText || "").trim();
  errorEl.innerHTML = "";

  if (!raw && !file) return;

  if (raw.length > MAX_LENGTH) {
    await showModal("최대 2,000자까지 입력 가능합니다");
    return;
  }

  const parsed = parseInput(raw, memoText);

  if (!file && parsed.urls.length === 0) {
    await showModal("URL을 한 개 이상 입력하거나 파일을 첨부해 주세요.");
    return;
  }

  isProcessing = true;
  goBtn.disabled = true;
  updateGoButton();
  goBtn.innerHTML = loadingHtml(file ? "문서를 분석하고 있어요" : "링크를 분석하고 있어요");

  let lastCategory = null;
  let fileSaved = false;
  const today = new Date().toLocaleDateString("ko-KR", { month: "long", day: "numeric" });

  try {
    if (file) {
      const stopLoading = startStageLoading(goBtn, { isFile: true });
      try {
        const fileData = await fileToBase64(file);
        const baseItem = { url: "", title: file.name, site: file.name, savedAt: today, savedTs: Date.now(), memo: parsed.memo, fileName: file.name, fileData };
        const r = await classifyOne({
          classifyInput: parsed.memo || "",
          baseItem,
          fileData,
          fileName: file.name,
        });
        lastCategory = r.category;
        fileSaved = true;
        attachedFile = null;
        $fileInput.value = "";
        renderFileChip();
      } finally {
        stopLoading();
      }
    }

    let savedCount = 0, skipped = 0, overwritten = 0;
    for (let i = 0; i < parsed.urls.length; i++) {
      const url = parsed.urls[i];

      const dup = findDuplicate(url);
      if (dup) {
        const yes = await confirmModal(
          `"${dup.item.title}"\n[${dup.category}]에 이미 저장되어 있어요.\n바꾸시겠습니까?`,
          { okLabel: "예, 바꿀게요", cancelLabel: "아니요" }
        );
        if (!yes) { skipped++; continue; }
        // 덮어쓰기: 기존 항목 제거
        const oldCat = dup.category;
        const oldIdx = (folders[oldCat] || []).findIndex(it => it.url === url);
        if (oldIdx !== -1) {
          folders[oldCat].splice(oldIdx, 1);
          if (folders[oldCat].length === 0) delete folders[oldCat];
          saveFolders();
        }
        overwritten++;
      }

      const progress = parsed.urls.length > 1 ? `(${i + 1}/${parsed.urls.length})` : "";
      const stopLoading = startStageLoading(goBtn, { isFile: false, progress });
      try {
        const domain = getDomain(url);
        const og = await fetchOG(url);
        const parts = [`URL: ${url}`];
        if (domain) parts.push(`도메인: ${domain}`);
        if (og?.siteName) parts.push(`사이트: ${og.siteName}`);
        if (og?.title) parts.push(`제목: ${og.title}`);
        if (og?.description) parts.push(`설명: ${og.description}`);
        if (parsed.memo) parts.push(`사용자 메모: ${parsed.memo}`);

        const baseItem = {
          url,
          title: og?.title || domain || url,
          site: og?.siteName || domain || "",
          savedAt: today,
          savedTs: Date.now(),
          memo: parsed.memo,
        };
        const r = await classifyOne({ classifyInput: parts.join("\n"), baseItem });
        lastCategory = r.category;
        savedCount++;
      } finally {
        stopLoading();
      }
    }

    const totalSaved = savedCount + (fileSaved ? 1 : 0);

    if (!totalSaved && skipped) {
      // 전부 중복으로 건너뜀
      isProcessing = false;
      goBtn.textContent = "분류하기";
      updateGoButton();
      return;
    }

    if (totalSaved > 1) showToast(`${totalSaved}개 저장 완료${skipped ? ` · ${skipped}개 건너뜀` : ""}`);
    else if (totalSaved === 1 && lastCategory) showToast(`[${lastCategory}]에 저장됐어요`);

    if (totalSaved > 0) {
      if (onSuccess) onSuccess();
      // 보관함으로 이동 (필터 초기화 — 새 자료가 맨 위에 보이도록)
      libFilter = { q: "", category: "전체", domains: new Set() };
      $libSearch.value = "";
      renderLibrary();
      showScreen("library");
    }
  } catch (e) {
    console.error(e);
    errorEl.innerHTML = `
      <div class="error">
        <div class="error-msg">잠시 응답이 늦어요. 다시 시도해 주세요.</div>
        <div class="error-detail">${escapeHtml(friendlyError(e))}</div>
        <button type="button" class="btn-retry">다시 시도</button>
      </div>`;
    errorEl.querySelector(".btn-retry").onclick = () => { errorEl.innerHTML = ""; goBtn.click(); };
  } finally {
    isProcessing = false;
    goBtn.disabled = false;
    goBtn.textContent = "분류하기";
    updateGoButton();
  }
}

// ── 보관함 (전체 리스트 + 검색 + 카테고리 필터) ─────────────
function allItems() {
  return Object.entries(folders).flatMap(([cat, items]) =>
    (items || []).map((it, idx) => ({ ...it, _cat: cat, _idx: idx }))
  );
}

function matchesQuery(item, q) {
  if (!q) return true;
  const needle = q.toLowerCase();
  if ((item.title || "").toLowerCase().includes(needle)) return true;
  if ((item.tags || []).some(t => t.toLowerCase().includes(needle))) return true;
  return false;
}

function renderLibrary() {
  const all = allItems();

  // 카테고리 칩 — [전체] / [내 폴더]
  $libChips.innerHTML = `
    <button class="chip ${libFilter.category === "전체" ? 'active' : ''}" data-cat="전체">
      전체<span class="num">${all.length}</span>
    </button>
    <button class="chip ${libFilter.category === FOLDERS_VIEW ? 'active' : ''}" data-cat="${FOLDERS_VIEW}">
      <svg class="chip-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>내 폴더
    </button>
  `;
  $libChips.querySelectorAll(".chip").forEach(el => {
    el.onclick = () => { libFilter.category = el.dataset.cat; renderLibrary(); };
  });

  // 내 폴더 모드 — 폴더 그리드를 렌더하고 종료
  if (libFilter.category === FOLDERS_VIEW) {
    $("libSearchSection").style.display = "";
    $("libDomainSection").style.display = "none";
    $("libListLabel").textContent = "내 폴더";
    $libFilteredCount.textContent = "";
    const q = libFilter.q.toLowerCase();
    const folderCats = [...new Set([...folderList, ...Object.keys(folders)])]
      .filter(c => !q || c.toLowerCase().includes(q));
    $libCards.innerHTML = `<div class="folder-grid">` + folderCats.map(cat => {
      const count = folders[cat]?.length || 0;
      return `
      <button class="folder-card" data-cat="${escapeHtml(cat)}">
        <span class="f-icon">${FOLDER_FILLED_ICON}<span class="f-badge">${count}</span></span>
        <span class="f-name">${escapeHtml(cat)}</span>
      </button>`;
    }).join("") + `
      <button class="folder-card folder-new" id="newFolderBtn">
        <span class="f-icon-new">+</span>
        <span class="f-name">새 폴더</span>
      </button>
    </div>`;
    $libCards.querySelectorAll(".folder-card[data-cat]").forEach(el => {
      el.onclick = () => { renderFolder(el.dataset.cat); showScreen("folder"); };
    });
    $("newFolderBtn").onclick = async () => {
      const name = await promptModal("새 폴더 만들기", "", "폴더 이름 (최대 20자)");
      if (!name) return;
      if (!folderList.includes(name) && !folders[name]) {
        folderList.push(name);
        saveFolderList();
        showToast(`[${name}] 폴더를 만들었어요`);
      }
      renderLibrary();
    };
    return;
  }
  $("libSearchSection").style.display = "";
  $("libListLabel").textContent = "저장 리스트";

  // 도메인 칩 — 2개 이상일 때만 섹션 표시
  const domainCounts = new Map();
  for (const it of all) {
    const d = getItemDomain(it);
    if (d) domainCounts.set(d, (domainCounts.get(d) || 0) + 1);
  }
  const topDomains = [...domainCounts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);
  const $domainSection = $("libDomainSection");
  if (topDomains.length < 2) {
    $domainSection.style.display = "none";
    libFilter.domains.clear();
  } else {
    $domainSection.style.display = "";
    $libDomainChips.innerHTML = topDomains.map(([d, n]) => {
      const brand = getBrandColor(d);
      const initial = getDomainInitial(d);
      return `
        <button class="chip domain-chip ${libFilter.domains.has(d) ? 'active' : ''}" data-domain="${escapeHtml(d)}">
          <span class="favicon-wrap" style="--brand:${brand}" data-initial="${initial}">
            <img class="favicon" src="${faviconUrl(d)}" alt="" onerror="this.remove();this.parentElement.classList.add('fallback')">
          </span>
          <span>${escapeHtml(d)}</span><span class="num">${n}</span>
        </button>
      `;
    }).join("");
    $libDomainChips.querySelectorAll(".chip").forEach(el => {
      el.onclick = () => {
        const d = el.dataset.domain;
        if (libFilter.domains.has(d)) libFilter.domains.delete(d); else libFilter.domains.add(d);
        renderLibrary();
      };
    });
    $libDomainReset.style.display = libFilter.domains.size > 0 ? "" : "none";
  }

  const filtered = all
    .filter(it => libFilter.category === "전체" || it._cat === libFilter.category)
    .filter(it => libFilter.domains.size === 0 || libFilter.domains.has(getItemDomain(it)))
    .filter(it => matchesQuery(it, libFilter.q))
    .sort((a, b) => (b.savedTs || 0) - (a.savedTs || 0));

  $libFilteredCount.textContent = filtered.length !== all.length ? `(${filtered.length}개)` : "";

  if (filtered.length === 0) {
    const isSearchMode = libFilter.q || libFilter.domains.size > 0 || libFilter.category !== "전체";
    $libCards.innerHTML = `
      <div class="empty">
        <div class="icon">${isSearchMode ? "🔎" : "📭"}</div>
        <div class="text">${isSearchMode ? "검색 결과가 없어요" : "아직 자료가 없어요"}</div>
        ${isSearchMode ? '<div class="sub">다른 키워드나 카테고리를 선택해 보세요</div>' : '<div class="sub">메인 화면에서 첫 자료를 저장해 보세요</div>'}
      </div>`;
    return;
  }

  $libCards.innerHTML = filtered.map((item) => {
    const isFile = isFileItem(item);
    const actionBtn = isFile
      ? `<button class="copy-btn" title="내려받기">${DOWNLOAD_ICON}</button>`
      : `<button class="copy-btn" title="복사">${COPY_ICON}</button>`;
    return `
    <div class="card" data-cat="${escapeHtml(item._cat)}" data-idx="${item._idx}">
      ${actionBtn}
      <button class="menu-btn" title="메뉴">${MENU_ICON}</button>
      <div class="card-menu">
        <button class="menu-edit">수정하기</button>
        <button class="menu-delete danger">삭제하기</button>
      </div>
      ${getCardIcon(item)}
      <div class="card-content">
        <div class="card-top-row">
          <button class="cat-badge-btn" title="카테고리 변경">
            ${escapeHtml(item._cat)}
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <span class="card-date">${escapeHtml(item.savedAt || "")}</span>
        </div>
        <div class="card-link">
          <div class="card-title">${escapeHtml(item.title)}</div>
          ${item.summary ? `<div class="card-desc">${escapeHtml(item.summary)}</div>` : ""}
          ${item.tags && item.tags.length ? `
            <div class="card-tags">${item.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("")}</div>
          ` : ""}
        </div>
      </div>
    </div>
  `;
  }).join("");

  $libCards.querySelectorAll(".card").forEach(el => {
    const cat = el.dataset.cat;
    const idx = parseInt(el.dataset.idx);

    el.addEventListener("click", (e) => {
      if (e.target.closest(".copy-btn") || e.target.closest(".menu-btn") ||
          e.target.closest(".card-menu") || e.target.closest(".cat-badge-btn")) return;
      renderDetail(cat, idx, "library");
    });

    el.querySelector(".menu-btn").onclick = (e) => {
      e.stopPropagation();
      const menu = el.querySelector(".card-menu");
      const isOpen = menu.classList.contains("open");
      closeAllCardMenus();
      if (!isOpen) menu.classList.add("open");
    };

    el.querySelector(".menu-edit").onclick = (e) => {
      e.stopPropagation();
      closeAllCardMenus();
      renderDetail(cat, idx, "library", { edit: true });
    };

    el.querySelector(".menu-delete").onclick = async (e) => {
      e.stopPropagation();
      closeAllCardMenus();
      if (await deleteItem(cat, idx)) renderLibrary();
    };

    el.querySelector(".copy-btn").onclick = async (e) => {
      e.stopPropagation();
      const item = folders[cat]?.[idx];
      if (!item) return;
      if (isFileItem(item)) { downloadFile(item); return; }
      const text = [
        item.title, item.summary,
        item.tags?.length ? item.tags.map(t => `#${t}`).join(" ") : "",
        item.url || ""
      ].filter(Boolean).join("\n");
      const btn = el.querySelector(".copy-btn");
      try {
        await navigator.clipboard.writeText(text);
        btn.innerHTML = CHECK_ICON;
        btn.classList.add("copied");
        showToast("복사했어요");
        setTimeout(() => { btn.innerHTML = COPY_ICON; btn.classList.remove("copied"); }, 1500);
      } catch (err) {
        showToast("복사 실패");
      }
    };

    el.querySelector(".cat-badge-btn").onclick = async (e) => {
      e.stopPropagation();
      const target = await openCategoryPicker(cat);
      if (!target || target === cat) return;
      await moveItem(cat, idx, target);
      renderLibrary();
    };
  });
}

// ── 미트볼 메뉴 ─────────────────────────────────────────
function closeAllCardMenus() {
  document.querySelectorAll(".card-menu.open").forEach(m => m.classList.remove("open"));
}
document.addEventListener("click", (e) => {
  if (!e.target.closest(".card-menu") && !e.target.closest(".menu-btn")) {
    closeAllCardMenus();
  }
});

// ── 상세 화면 ───────────────────────────────────────────
let detailCtx = null; // { category, idx, from }

function renderDetail(category, idx, from, opts = {}) {
  const item = folders[category]?.[idx];
  if (!item) { showScreen(from === "folder" ? "folder" : "library"); return; }
  detailCtx = { category, idx, from, editing: !!opts.edit };
  $("detailEditBtn").style.display = opts.edit ? "none" : "";
  $("detailDeleteBtn").style.display = opts.edit ? "" : "none";
  if (opts.edit) renderDetailEdit(category, idx, item);
  else renderDetailView(category, idx, item);
  showScreen("detail");
  window.scrollTo(0, 0);
}

function renderDetailView(category, idx, item) {
  const domain = getItemDomain(item);
  const $body = $("detailBody");
  $body.innerHTML = `
    <div class="detail-top">
      <button class="cat-badge-btn detail-cat" title="카테고리 변경">
        ${escapeHtml(category)}
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <span class="detail-meta">

        ${escapeHtml(item.savedAt || "")}
      </span>
    </div>
    <div class="detail-title-row">
      <div class="detail-title">${escapeHtml(item.title)}</div>
      ${isFileItem(item)
        ? `<button class="detail-copy" title="내려받기">${DOWNLOAD_ICON}</button>`
        : `<button class="detail-copy" title="복사">${COPY_ICON}</button>`}
    </div>

      <div class="detail-card">
        <div class="label">요약</div>
        <div class="body">${escapeHtml(item.summary)}</div>
      </div>
    ` : ""}
    ${item.memo ? `
      <div class="detail-card">
        <div class="label">메모</div>
        <div class="body">${escapeHtml(item.memo)}</div>

    ${item.tags?.length ? `<div class="detail-tags">${item.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("")}</div>` : ""}
    ${item.url ? `<a class="detail-link-btn" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${LINK_ICON} 원문 열기</a>` : ""}

      btn.innerHTML = CHECK_ICON;
      btn.classList.add("copied");

$("detailBack").onclick = () => {
  if (detailCtx?.editing) {
    // 편집 모드 → 해당 카드 상세(읽기) 화면으로 복귀
    renderDetail(detailCtx.category, detailCtx.idx, detailCtx.from);
    return;
  }
  if (detailCtx?.from === "folder" && folders[detailCtx.category]) {
    renderFolder(detailCtx.category);
    showScreen("folder");
  } else {
    renderLibrary();
    showScreen("library");
  }
};
$("detailEditBtn").onclick = () => {
  if (!detailCtx) return;
  renderDetail(detailCtx.category, detailCtx.idx, detailCtx.from, { edit: true });
};
$("detailDeleteBtn").onclick = async () => {
  if (!detailCtx) return;
  if (await deleteItem(detailCtx.category, detailCtx.idx)) {
    if (detailCtx.from === "folder" && folders[detailCtx.category]) {
      renderFolder(detailCtx.category);

      renderLibrary();

};
$("detailFab").onclick = openAddModal;

$("openLibrary").onclick = () => { libFilter = { q: "", category: "전체", domains: new Set() }; $libSearch.value = ""; renderLibrary(); showScreen("library"); };
$("libBack").onclick = () => showScreen("main");
$libSearch.addEventListener("input", () => { libFilter.q = $libSearch.value.trim(); renderLibrary(); });

// ── 새 자료 추가 모달 (보관함 / 상세 FAB) ───────────────
const $addInput = $("addInput"), $addMemo = $("addMemo"), $addGo = $("addGo");
const $addError = $("addError"), $addMemoToggle = $("addMemoToggle"), $addMemoWrap = $("addMemoWrap");
const ADD_MEMO_LABEL = `＋ 메모 추가하기 <span style="color:var(--text-4);font-weight:500">(선택)</span>`;

let addAttachedFile = null;
function renderAddFileChip() {
  renderFileChipEl($("addFileChipSlot"), addAttachedFile, () => {
    addAttachedFile = null;
    $("addFileInput").value = "";
    renderAddFileChip();
  });
}
function setAddAttachedFile(file) {
  if (!file) return;
  const ext = (file.name.split(".").pop() || "").toLowerCase();
  if (!ALLOWED_EXTS.includes(ext)) { showToast("PDF · DOCX · XLSX 파일만 올릴 수 있어요"); return; }
  if (file.size > MAX_FILE_MB * 1024 * 1024) { showToast(`${MAX_FILE_MB}MB 이하 파일만 올릴 수 있어요`); return; }
  addAttachedFile = file;
  renderAddFileChip();
}
$("addAttachBtn").onclick = () => $("addFileInput").click();
$("addFileInput").addEventListener("change", () => setAddAttachedFile($("addFileInput").files?.[0]));

// 모달 컴포저 드래그앤드롭
const $addComposer = $("addComposer");
["dragenter", "dragover"].forEach(ev =>
  $addComposer.addEventListener(ev, (e) => { e.preventDefault(); $addComposer.classList.add("dragover"); })
);
["dragleave", "drop"].forEach(ev =>
  $addComposer.addEventListener(ev, (e) => {
    e.preventDefault();
    if (ev === "dragleave" && $addComposer.contains(e.relatedTarget)) return;
    $addComposer.classList.remove("dragover");
  })
);
$addComposer.addEventListener("drop", (e) => {
  const f = e.dataTransfer?.files?.[0];
  if (f) setAddAttachedFile(f);
});

// 토글 문구는 항상 고정 — 메인 화면과 동일하게
$addMemoToggle.onclick = () => {
  const open = $addMemoWrap.classList.toggle("open");
  if (open) setTimeout(() => $addMemo.focus(), 0);
};
// 링크 입력 시 메모 영역 자동 표시, 모두 지우면 닫힘
$addInput.addEventListener("input", () => {
  if ($addInput.value.trim()) $addMemoWrap.classList.add("open");
  else $addMemoWrap.classList.remove("open");
});

function openAddModal() {
  $addInput.value = "";
  $addMemo.value = "";
  $addError.innerHTML = "";
  $addMemoWrap.classList.remove("open");
  $addMemoToggle.innerHTML = ADD_MEMO_LABEL;
  addAttachedFile = null;
  $("addFileInput").value = "";
  renderAddFileChip();
  $("addModal").classList.add("show");
  setTimeout(() => $addInput.focus(), 0);
}
function closeAddModal() {
  $("addModal").classList.remove("show");
}

$("libFab").onclick = openAddModal;
$("addCancel").onclick = closeAddModal;
$addGo.onclick = () => classifyAndSave({
  rawText: $addInput.value,
  memoText: $addMemo.value,
  file: addAttachedFile,
  goBtn: $addGo,
  errorEl: $addError,
  onSuccess: () => {
    addAttachedFile = null;
    $("addFileInput").value = "";
    renderAddFileChip();
    closeAddModal();
  },
});
</script>
